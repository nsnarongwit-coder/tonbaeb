<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ชำระเงินสำเร็จ — TONBAEB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#081527;color:#e9effa;font-family:Sarabun,sans-serif}.box{max-width:620px;background:#0e2140;border:1px solid rgba(124,162,224,.2);border-radius:18px;padding:34px;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.28)}.mark{width:64px;height:64px;margin:auto;border-radius:50%;display:grid;place-items:center;background:#3ecf8e;color:#08301e;font:bold 34px Prompt}h1{font:700 28px Prompt;margin:18px 0 10px}p{color:#a9bad5;line-height:1.75}.note{background:rgba(240,180,65,.1);border:1px solid rgba(240,180,65,.35);border-radius:12px;padding:14px;margin:20px 0;color:#f0c66a}.btn{display:inline-block;background:#f0b441;color:#20293e;text-decoration:none;font:600 16px Prompt;padding:11px 22px;border-radius:999px}
  </style>
</head>
<body><main class="box"><div class="mark">✓</div><h1>ได้รับคำสั่งซื้อแล้ว</h1><p>ระบบได้รับผลการชำระเงินของคุณแล้ว กรุณาเก็บอีเมลยืนยันและเลขรายการไว้เป็นหลักฐาน</p><div class="note">เวอร์ชันทดสอบนี้ยังไม่ส่งไฟล์อัตโนมัติ จนกว่าจะตั้งค่าคลังไฟล์ส่วนตัวและอีเมลเรียบร้อย</div><a class="btn" href="/">กลับหน้า TONBAEB</a></main></body>
</html>
